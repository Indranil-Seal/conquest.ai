name: Update Repository Activity Stats

# Runs daily at midnight UTC, or manually via workflow_dispatch.
# Fetches view counts, clone counts, and fork usernames from the GitHub API
# and writes them to stats/activity.md, then commits the result back.

on:
  schedule:
    - cron: '0 0 * * *'   # Daily at 00:00 UTC
  workflow_dispatch:        # Manual trigger from Actions tab

permissions:
  contents: write           # Required to commit and push stats/activity.md

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch and write activity stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: Indranil-Seal
          REPO_NAME: conquest.ai
        run: python .github/scripts/update_stats.py

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/activity.md
          # Only commit if the file actually changed
          git diff --staged --quiet || git commit -m "chore: update repository activity stats [skip ci]"
          git push
